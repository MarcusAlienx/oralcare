
services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: oralcare_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supersecretpassword}
      POSTGRES_DB: oralcare
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oralcare_user -d oralcare"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_URL=postgresql://oralcare_user:${DB_PASSWORD:-supersecretpassword}@db:5432/oralcare
      - SESSION_SECRET=${SESSION_SECRET:-changeme_in_production}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
