server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Rutas SPA: Redirigir cualquier request no encontrado a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para el API
    # Redirige todo lo que empieza con /api/ al backend interno en Docker
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;

        # Estas cabeceras son CRÍTICAS para el Server-Sent Events (SSE) del chat de IA
        proxy_set_header Connection '';
        proxy_set_header Cache-Control 'no-cache';
        proxy_set_header X-Accel-Buffering 'no';
        proxy_buffering off;
        chunked_transfer_encoding on;
        proxy_read_timeout 24h;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
